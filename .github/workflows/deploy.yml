name: Deploy Django Backend to VPS

on:
  push:
    branches:
      - main   # change if you use another branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/ssalavation-tattoo

            echo "Pulling latest code..."
            git pull origin main

            echo "Rebuilding Docker containers..."
            docker compose down
            docker compose up -d --build

            echo "Running migrations..."
            docker exec salvation_backend python manage.py migrate

            echo "Collecting static files..."
            docker exec salvation_backend python manage.py collectstatic --noinput

            echo "Deployment completed!"